name: Build CineStream Dylib
on: [push]

jobs:
  build:
    runs-on: macos-26 # Using the 2026 latest runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: CineStreamGate-1024-Dylib
          path: .theos/obj/debug/CineStreamGate.dylib
