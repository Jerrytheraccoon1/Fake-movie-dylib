name: Build CineStream Dylib
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # Install Theos manually to avoid the API error
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # Download a specific patched SDK manually
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/master.tar.gz
          tar -xf master.tar.gz -C ~/theos/sdks --strip-components=1
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos
          # We tell the compiler exactly which SDK to use
          SDKVERSION: 14.5 

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: CineStreamGate-1024-Dylib
          path: .theos/obj/debug/CineStreamGate.dylib
